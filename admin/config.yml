backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  # ── FILMS (Art section) ────────────────────────────────────────────────
  - name: "films"
    label: "Films & Art"
    folder: "_data/films"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Type", name: "type", widget: "string", hint: "e.g. Short Film · 14 min · Berlin" }
      - { label: "Year", name: "year", widget: "string" }
      - { label: "Role", name: "role", widget: "string", hint: "e.g. Director · Cinematographer" }
      - { label: "Format", name: "format", widget: "string", hint: "e.g. Short Film / Documentary / Photography" }
      - { label: "Festival / Screened at", name: "festival", widget: "string", required: false }
      - { label: "Director", name: "director", widget: "string", required: false }
      - { label: "DP / Cinematography", name: "dp", widget: "string", required: false }
      - { label: "Runtime", name: "runtime", widget: "string", required: false, hint: "e.g. 14 min" }
      - { label: "Camera", name: "camera", widget: "string", required: false }
      - { label: "Vimeo Video ID", name: "vimeo", widget: "string", required: false, hint: "Just the number from the Vimeo URL" }
      - { label: "YouTube Video ID", name: "youtube", widget: "string", required: false, hint: "The part after ?v= in the YouTube URL" }
      - { label: "Cover Image", name: "cover", widget: "image", required: false }
      - label: "Gallery Images"
        name: "images"
        widget: "list"
        required: false
        field: { label: "Image", name: "image", widget: "image" }
      - label: "Write-up"
        name: "writeup"
        widget: "list"
        hint: "Each item is one paragraph"
        field: { label: "Paragraph", name: "paragraph", widget: "text" }
      - label: "Section"
        name: "section"
        widget: "select"
        options:
          - { label: "Films", value: "films" }
          - { label: "Photography", value: "photography" }
          - { label: "Experimental", value: "experimental" }
        default: "films"
      - label: "Featured"
        name: "featured"
        widget: "boolean"
        default: false
        hint: "Show in the Featured section at the top"
      - label: "Order"
        name: "order"
        widget: "number"
        default: 99
        hint: "Lower numbers appear first"

  # ── COMMERCIAL PROJECTS ───────────────────────────────────────────────
  - name: "commercial"
    label: "Commercial Work"
    folder: "_data/commercial"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Client", name: "client", widget: "string" }
      - { label: "Project Title", name: "title", widget: "string" }
      - { label: "Type", name: "type", widget: "string", hint: "e.g. Brand Campaign / Paid Social / Platform Content" }
      - { label: "Year", name: "year", widget: "string" }
      - { label: "Short Description", name: "desc", widget: "text", hint: "2-3 sentences max — shown under the video card" }
      - { label: "Thumbnail Image", name: "thumb", widget: "image", required: false }
      - { label: "Vimeo Video ID", name: "vimeo", widget: "string", required: false }
      - { label: "YouTube Video ID", name: "youtube", widget: "string", required: false }
      - label: "Order"
        name: "order"
        widget: "number"
        default: 99
        hint: "Lower numbers appear first"

  # ── SITE SETTINGS ─────────────────────────────────────────────────────
  - name: "settings"
    label: "Site Settings"
    files:
      - label: "General"
        name: "general"
        file: "_data/settings.yml"
        fields:
          - { label: "Your Name", name: "name", widget: "string", default: "Deep Dakshy" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Instagram URL", name: "instagram", widget: "string" }
          - { label: "Vimeo URL", name: "vimeo_profile", widget: "string" }
          - { label: "LinkedIn URL", name: "linkedin", widget: "string" }
          - { label: "Commercial Showreel Vimeo ID", name: "commercial_reel", widget: "string", required: false }
          - { label: "Art Showreel Vimeo ID", name: "art_reel", widget: "string", required: false }
          - { label: "Landing Video (loop.mp4 filename)", name: "landing_video", widget: "string", required: false }
